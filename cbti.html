<script>
(function() {
  var cfg = CONFIG;
  var qs = cfg.questions;
  var totalQ = qs.length;
  var currentQ = 0;
  var latestRes = null;

  var dimKeys = Object.keys(cfg.dims);
  var typeKeys = Object.keys(cfg.types);

  // 维度分 初始3分（中间值），范围0-6
  var dimScores = {};
  for (var i = 0; i < dimKeys.length; i++) { dimScores[dimKeys[i]] = 3; }

  // 人格直接加成
  var typeBonus = {};
  for (var i = 0; i < typeKeys.length; i++) { typeBonus[typeKeys[i]] = 0; }

  // 维度组颜色适配吉伊卡哇风格
  var groupColors = { S: '#16a34a', E: '#db2777', A: '#7c3aed', Ac: '#dc2626', So: '#0891b2' };

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  function showScreen(id) {
    var all = document.querySelectorAll('.screen');
    for (var i = 0; i < all.length; i++) { all[i].classList.remove('active'); }
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function renderQ() {
    var pct = Math.round((currentQ / totalQ) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('q-counter').textContent = (currentQ + 1) + ' / ' + totalQ;
    document.getElementById('q-num').textContent = (currentQ + 1 < 10 ? '0' : '') + (currentQ + 1);
    var q = qs[currentQ];
    document.getElementById('q-text').textContent = q.q;
    
    var hintEl = document.getElementById('q-hint');
    hintEl.textContent = q.hint || '';
    hintEl.style.display = q.hint ? 'block' : 'none';

    var optsEl = document.getElementById('q-opts');
    optsEl.innerHTML = '';
    var letters = ['A', 'B', 'C'];
    for (var i = 0; i < q.opts.length; i++) {
      var opt = q.opts[i];
      var el = document.createElement('div');
      el.className = 'q-opt';
      el.innerHTML =
        '<div class="q-opt-letter">' + letters[i] + '</div>' +
        '<div class="q-opt-text">' + opt.text + '</div>';
      (function(delta) {
        el.addEventListener('click', function() {
          for (var dk in delta) {
            if (dimScores.hasOwnProperty(dk)) {
              dimScores[dk] = clamp(dimScores[dk] + delta[dk], 0, 6);
            } else if (typeBonus.hasOwnProperty(dk)) {
              typeBonus[dk] += delta[dk];
            }
          }
          currentQ++;
          if (currentQ >= totalQ) { showResult(); } else { renderQ(); }
        });
      })(opt.delta || {});
      optsEl.appendChild(el);
    }
  }

  function calcResult() {
    var scores = {};
    for (var i = 0; i < typeKeys.length; i++) {
      var tk = typeKeys[i];
      var t = cfg.types[tk];
      var score = (typeBonus[tk] || 0) * 3;
      for (var dk in t.weights) {
        if (!dimScores.hasOwnProperty(dk)) continue;
        var wt = t.weights[dk];
        var ds = dimScores[dk];
        if (wt > 0) { score += (ds / 6) * wt * 4; }
        else { score += ((6 - ds) / 6) * Math.abs(wt) * 4; }
      }
      scores[tk] = score;
    }
    var winner = typeKeys[0];
    var maxS = scores[typeKeys[0]];
    var secondS = -Infinity;
    for (var i = 1; i < typeKeys.length; i++) {
      var s = scores[typeKeys[i]];
      if (s > maxS) {
        secondS = maxS;
        maxS = s;
        winner = typeKeys[i];
      } else if (s > secondS) {
        secondS = s;
      }
    }
    if (secondS === -Infinity) secondS = maxS;

    var total = 0;
    for (var i = 0; i < typeKeys.length; i++) { total += scores[typeKeys[i]]; }

    // Use both absolute dominance and runner-up gap so percentage has visible spread.
    var share = total > 0 ? (maxS / total) : 0;
    var gap = maxS - secondS;
    var denom = Math.max(Math.abs(maxS), 1);
    var gapRatio = clamp(gap / denom, 0, 1);
    var rawPct = 52 + (share * 170) + (gapRatio * 28);
    var pct = clamp(Math.round(rawPct), 55, 95);

    var hit = clamp(Math.floor(pct / 7) + 3, 9, 15);
    return { type: winner, pct: pct, hit: hit };
  }

  function dimLevel(s) { return s <= 2 ? 'L' : s <= 4 ? 'M' : 'H'; }

  function showResult() {
    var res = calcResult();
    latestRes = res;
    var d = cfg.types[res.type];
    showScreen('result-screen');

    var card = document.getElementById('r-avatar-card');
    card.style.background = d.bg;
    card.style.border = '2px solid ' + d.color + '40';
    card.style.boxShadow = '6px 6px 0 ' + d.color + '25';
    var avatarEl = document.getElementById('r-avatar-emoji');
    var labelEl = document.getElementById('r-avatar-label');
    avatarEl.setAttribute('data-fallback-emoji', d.emoji || '🙂');
    if (d.img) {
      avatarEl.innerHTML = '<img crossorigin="anonymous" referrerpolicy="no-referrer" src="' + d.img + '" alt="' + (d.name || res.type) + '" onerror="this.remove(); this.parentElement.textContent=\'' + (d.emoji || '') + '\';"></img>';
    } else {
      avatarEl.textContent = d.emoji || '';
    }
    labelEl.textContent = d.quote || '';

    var codeEl = document.getElementById('r-type-code');
    codeEl.textContent = d.code || res.type;
    codeEl.style.background = d.color;
    document.getElementById('r-type-name').textContent = d.name;
    var pctText = res.pct + '%';
    var pctEl = document.getElementById('r-match-pct');
    pctEl.innerText = pctText;
    pctEl.textContent = pctText;
    pctEl.setAttribute('data-pct', pctText);
    document.getElementById('r-hit').textContent = '精准共鸣 ' + res.hit + '/15 维度 · 灵魂极度契合';
    document.getElementById('r-hit').setAttribute('data-hit', '精准共鸣 ' + res.hit + '/15 维度 · 灵魂极度契合');
    document.getElementById('r-slogan').textContent = d.slogan;
    document.getElementById('r-desc').textContent = d.desc;

    var dimList = document.getElementById('dim-list');
    dimList.innerHTML = '';
    for (var i = 0; i < dimKeys.length; i++) {
      var dk = dimKeys[i];
      var dc = cfg.dims[dk];
      var lv = dimLevel(dimScores[dk]);
      var fillPct = Math.round((dimScores[dk] / 6) * 100);
      var groupKey = dc.group;
      var barColor = groupColors[groupKey] || '#ef4444';
      var row = document.createElement('div');
      row.className = 'dim-row';
      row.innerHTML =
        '<div class="dim-labels">' +
          '<div class="dim-code">' + dk + '</div>' +
          '<div class="dim-name">' + dc.name + '</div>' +
        '</div>' +
        '<div class="dim-right">' +
          '<div class="dim-track"><div class="dim-fill" style="width:' + fillPct + '%;background:' + barColor + '"></div></div>' +
          '<div class="dim-desc">' + dc[lv] + '</div>' +
        '</div>' +
        '<div class="dim-badge ' + lv + '">' + lv + '</div>';
      dimList.appendChild(row);
    }

    document.getElementById('btn-retry').onclick = function() {
      currentQ = 0;
      for (var i = 0; i < dimKeys.length; i++) { dimScores[dimKeys[i]] = 3; }
      for (var i = 0; i < typeKeys.length; i++) { typeBonus[typeKeys[i]] = 0; }
      showScreen('start-screen');
    };
    document.getElementById('btn-save').onclick = function() { saveImage(); };
    document.getElementById('save-close').onclick = function() { document.getElementById('save-ov').classList.remove('show'); };
    document.getElementById('save-dl').onclick = function() { downloadImage(); };
  }

  function syncShareCardData() {
    var res = latestRes || calcResult();
    var pctEl = document.getElementById('r-match-pct');
    if (pctEl && res) {
      var pctText = res.pct + '%';
      pctEl.innerText = pctText;
      pctEl.textContent = pctText;
      pctEl.setAttribute('data-pct', pctText);
      pctEl.style.display = 'inline-block';
    }

    var hitEl = document.getElementById('r-hit');
    if (hitEl && res) {
      var hitText = '精准共鸣 ' + res.hit + '/15 维度 · 灵魂极度契合';
      if (!hitEl.textContent || !hitEl.textContent.trim()) {
        hitEl.textContent = hitText;
      }
      hitEl.setAttribute('data-hit', hitText);
    }
  }

  function loadJS(url, flag, cb, onError) {
    if (window[flag]) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = function() { cb && cb(); };
    s.onerror = function() {
      if (onError) onError();
      else alert('资源加载失败，请手动截图保存');
    };
    document.head.appendChild(s);
  }

  function loadJSFallback(urls, flag, cb, onError) {
    if (window[flag]) { cb && cb(); return; }
    var i = 0;
    function tryNext() {
      if (i >= urls.length) {
        if (onError) onError();
        else alert('资源加载失败，请手动截图保存');
        return;
      }
      loadJS(urls[i++], flag, cb, tryNext);
    }
    tryNext();
  }

  function genQR(cb) {
    var el = document.getElementById('qr'); el.innerHTML = '';
    function doGen() {
      try {
        new QRCode(el, { text: window.location.href, width: 64, height: 64,
          colorDark: '#1c1c1a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
      } catch(e) { document.getElementById('qr-footer').style.display = 'none'; }
      setTimeout(cb, 120);
    }
    loadJSFallback([
      'https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js',
      'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'
    ], 'QRCode', doGen, function() {
      document.getElementById('qr-footer').style.display = 'none';
      cb();
    });
  }

  function waitForImages(container, timeoutMs) {
    return new Promise(function(resolve) {
      if (!container) { resolve(); return; }

      var imgs = container.querySelectorAll('img');
      if (!imgs.length) { resolve(); return; }

      var done = 0;
      var settled = false;
      var timer = null;

      function finish() {
        if (settled) return;
        settled = true;
        if (timer) clearTimeout(timer);
        resolve();
      }

      function markDone() {
        done++;
        if (done >= imgs.length) finish();
      }

      timer = setTimeout(finish, timeoutMs || 2500);

      for (var i = 0; i < imgs.length; i++) {
        var img = imgs[i];
        if (img.complete) {
          markDone();
          continue;
        }
        img.addEventListener('load', markDone, false);
        img.addEventListener('error', markDone, false);
      }

      if (done >= imgs.length) finish();
    });
  }

  function captureShareCard(onSuccess, onFail) {
    var shareCard = document.getElementById('xbti-share-card');

    function captureOptions() {
      var res = latestRes || calcResult();
      var livePctEl = document.getElementById('r-match-pct');
      var currentPct = (res && typeof res.pct !== 'undefined')
        ? (res.pct + '%')
        : (livePctEl ? ((livePctEl.textContent || livePctEl.innerText || '').trim() || (livePctEl.getAttribute('data-pct') || '').trim()) : '');
      var hitText = (res && typeof res.hit !== 'undefined') ? ('精准共鸣 ' + res.hit + '/15 维度 · 灵魂极度契合') : '';
      return {
        backgroundColor: '#f5f5f0',
        scale: 2,
        useCORS: true,
        allowTaint: false,
        imageTimeout: 15000,
        logging: false,
        onclone: function(cloneDoc) {
          var rowEl = cloneDoc.querySelector('.r-match-row');
          if (rowEl) {
            rowEl.innerHTML = '';
            rowEl.textContent = (currentPct || '--') + ' 匹配度';
            rowEl.style.fontSize = '16px';
            rowEl.style.fontWeight = '800';
            rowEl.style.color = '#1c1c1a';
            rowEl.style.display = 'inline-flex';
            rowEl.style.alignItems = 'center';
            rowEl.style.justifyContent = 'center';
            rowEl.style.visibility = 'visible';
            rowEl.style.opacity = '1';
          }

          var hitEl = cloneDoc.getElementById('r-hit');
          if (hitEl && (!hitEl.textContent || !hitEl.textContent.trim())) {
            hitEl.textContent = hitText || hitEl.getAttribute('data-hit') || '';
          }
        }
      };
    }

    html2canvas(shareCard, captureOptions()).then(function(canvas) {
      onSuccess(canvas);
    }).catch(function() {
      var avatarEl = document.getElementById('r-avatar-emoji');
      var img = avatarEl ? avatarEl.querySelector('img') : null;
      var fallbackEmoji = avatarEl ? (avatarEl.getAttribute('data-fallback-emoji') || '🙂') : '🙂';

      if (!img) { onFail(); return; }

      img.remove();
      avatarEl.textContent = fallbackEmoji;

      html2canvas(shareCard, captureOptions()).then(function(canvas2) {
        onSuccess(canvas2);
      }).catch(function() {
        onFail();
      });
    });
  }

  // Final fallback: draw percentage directly on canvas to bypass html2canvas text loss.
  function reinforceCanvasMatchText(canvas) {
    if (!canvas) return;

    var res = latestRes || calcResult();
    var pctText = (res && typeof res.pct !== 'undefined') ? (res.pct + '%') : '';
    if (!pctText) return;

    var shareCard = document.getElementById('xbti-share-card');
    var rowEl = document.querySelector('.r-match-row');
    if (!shareCard || !rowEl) return;

    var shareRect = shareCard.getBoundingClientRect();
    var rowRect = rowEl.getBoundingClientRect();
    var rawScale = shareRect.width > 0 ? (canvas.width / shareRect.width) : 1;
    var dpr = window.devicePixelRatio || 1;
    var scale = rawScale;

    // html2canvas scale can include DPR on some devices; normalize to avoid drift.
    if (rawScale > 2.5 && dpr > 1) {
      scale = rawScale / dpr;
    }

    var xBase = (rowRect.left - shareRect.left) + 14;
    var yBase = (rowRect.top - shareRect.top) + (rowRect.height * 0.65);

    var x = xBase * scale;
    var y = yBase * scale;

    var ctx = canvas.getContext('2d');
    if (!ctx) return;

    ctx.save();
    ctx.fillStyle = '#1c1c1a';
    ctx.font = '800 ' + Math.round(16 * scale) + 'px Sora, sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(pctText, x, y);
    ctx.restore();
  }

  function saveImage() {
    var ov = document.getElementById('save-ov');
    ov.classList.add('show', 'loading');
    var qrWrap = document.getElementById('qr-footer');
    syncShareCardData();
    genQR(function() {
      qrWrap.style.display = 'flex';
      loadJSFallback([
        'https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
        'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'
      ], 'html2canvas', function() {
        setTimeout(function() {
          var shareCard = document.getElementById('xbti-share-card');
          syncShareCardData();
          waitForImages(shareCard, 3000).then(function() {
            captureShareCard(function(canvas) {
              qrWrap.style.display = 'none';
              // Keep exported text fully DOM-based to avoid device-dependent canvas drift.
              window._xbtiCanvas = canvas;
              document.getElementById('save-img').src = canvas.toDataURL('image/png');
              ov.classList.remove('loading');
            }, function() {
              qrWrap.style.display = 'none';
              ov.classList.remove('show', 'loading');
              alert('生成失败，请截图保存');
            });
          });
        }, 100);
      }, function() {
        qrWrap.style.display = 'none';
        ov.classList.remove('show', 'loading');
        alert('分享图组件加载失败，请检查网络后重试');
      });
    });
  }

  function downloadImage() {
    if (!window._xbtiCanvas) return;
    var dataUrl;
    try {
      dataUrl = window._xbtiCanvas.toDataURL('image/png');
    } catch (e) {
      alert('图片受跨域限制，建议长按预览图保存');
      return;
    }

    var link = document.createElement('a');
    link.download = 'CBTI灵魂镜像测试结果.png';
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  document.getElementById('start-btn').addEventListener('click', function() {
    showScreen('quiz-screen');
    renderQ();
  });
})();
</script>
